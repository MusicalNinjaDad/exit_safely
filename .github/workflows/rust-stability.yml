name: Rust

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 6 * *'

env:
    CARGO_TERM_COLOR: always
    RUSTC_BOOTSTRAP: 1

jobs:

  test:
    strategy:
      matrix:
        channel: ["stable", "beta", "nightly"]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: ${{ matrix.channel }}
    - name: Run tests
      run: cargo test

  lint:
    strategy:
      matrix:
        channel: ["stable", "beta", "nightly"]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: ${{ matrix.channel }}
    - name: clippy
      run: cargo clippy
